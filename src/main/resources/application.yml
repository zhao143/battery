server:
  port: 8080

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/bms_uuid?useUnicode=true&characterEncoding=UTF-8&serverTimezone=UTC
    username: root
    password: 123456
  sql:
    init:
      mode: always
      platform: mysql
      schema-locations: classpath:schema.sql
  mvc:
    pathmatch:
      matching-strategy: ant_path_matcher

mybatis:
  mapper-locations: classpath:mapper/*.xml
  configuration:
    map-underscore-to-camel-case: true

tcp:
  port: 9000

jwt:
  secret: bmsSecretKey2024VeryLongSecretKeyForHS256Algorithm
  expiration: 86400000

springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    enabled: true
    path: /swagger-ui.html
    config-url: /v3/api-docs/swagger-config
    url: /v3/api-docs